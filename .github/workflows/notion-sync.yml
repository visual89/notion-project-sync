name: 프로젝트 연결

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Packages
        run: |
          pip install -r requirements.txt

      - name: Run Sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          python sync_all_projects.py > sync_result.txt 2>&1

      - name: Show Result
        if: always()
        run: |
          if [ -f sync_result.txt ]; then
            cat sync_result.txt
          else
            echo "sync_result.txt 파일이 생성되지 않았습니다."
          fi
